name: iOS Simulator Build (Appetize)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS Simulator
        run: |
          xcodebuild \
            -workspace ios/boardacademy.xcworkspace \
            -scheme boardacademy \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app as .tar.gz
        run: |
          cd ios/build/Build/Products/Release-iphonesimulator
          tar -czf ~/boardacademy-simulator.tar.gz boardacademy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boardacademy-ios-simulator
          path: ~/boardacademy-simulator.tar.gz
          retention-days: 7
