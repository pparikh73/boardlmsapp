name: iOS Simulator Build (Appetize)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS Simulator
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          echo "Workspace: $WORKSPACE"
          echo "Available schemes:"
          xcodebuild -workspace "$WORKSPACE" -list 2>&1
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | awk '/Schemes:/,/^$/' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app as .tar.gz
        run: |
          APP=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" -maxdepth 1 | head -1)
          echo "Packaging: $APP"
          tar -czf ~/boardacademy-simulator.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boardacademy-ios-simulator
          path: ~/boardacademy-simulator.tar.gz
          retention-days: 7
